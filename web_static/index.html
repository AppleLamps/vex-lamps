<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vex Code</title>
<style>
  :root{
    --bg:#f7f5f1;
    --rail:#f0ece4;
    --surface:#fffdfa;
    --surface-2:#f8f6f1;
    --surface-3:#f2eee7;
    --text:#24211c;
    --muted:#746d65;
    --faint:#a39b91;
    --line:#e1dbd1;
    --line-strong:#d2cabd;
    --blue:#12688f;
    --green:#14723b;
    --red:#b73a2d;
    --amber:#9a5b12;
    --shadow:0 12px 34px rgba(51,42,31,.08);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font:14px/1.45 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0}
  button,input,select,textarea{font:inherit}
  button{border:0;background:transparent;color:inherit;cursor:pointer}
  button:disabled,a.disabled{cursor:not-allowed;opacity:.5;pointer-events:none}
  a{color:inherit}
  .app{height:100dvh;display:grid;grid-template-columns:272px minmax(0,1fr);overflow:hidden}
  .app.focus{grid-template-columns:minmax(0,1fr)}
  .app.focus .rail{display:none}
  .rail{background:var(--rail);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0}
  .brand{height:56px;display:flex;align-items:center;gap:10px;padding:0 18px}
  .brand-title{font-family:Georgia,"Times New Roman",serif;font-size:20px;line-height:1;color:#1f1d19}
  .preview{font-size:11px;color:var(--muted);background:#e8e2d8;border-radius:7px;padding:3px 7px}
  .primary-action{margin:8px 14px 10px;height:34px;border:1px solid var(--line-strong);border-radius:8px;background:#fff;display:flex;align-items:center;gap:9px;padding:0 10px;font-weight:560}
  .rail-actions{padding:2px 14px 12px;display:grid;gap:3px}
  .nav-btn{height:31px;display:flex;align-items:center;gap:10px;border-radius:7px;padding:0 9px;color:#312e29;text-align:left}
  .nav-btn:hover{background:#e5dfd5}
  .nav-icon{width:18px;text-align:center;color:#6d645b;font-size:12px}
  .recents-head{padding:11px 18px 6px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em;display:flex;justify-content:space-between;align-items:center}
  .sessions{overflow:auto;padding:0 12px 12px;display:grid;gap:2px}
  .session{min-height:29px;display:grid;grid-template-columns:18px minmax(0,1fr);align-items:center;gap:7px;border-radius:8px;padding:4px 8px;color:#4b4741;text-align:left}
  .session:hover,.session.active{background:#ded8cf}
  .session .dot{width:7px;height:7px;border-radius:50%;background:#9a8f82}
  .session.active .dot{background:var(--blue)}
  .session .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
  .rail-bottom{margin-top:auto;padding:10px 12px;border-top:1px solid var(--line)}
  .status-card{height:38px;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:0 10px;color:#5c554e}
  .status-card b{margin-left:auto;color:#2563eb;font-weight:560}
  .identity{display:flex;align-items:center;gap:8px;padding:10px 4px 2px;color:#4f4942}
  .avatar{width:24px;height:24px;border-radius:50%;background:#e5ded3;display:grid;place-items:center;font-size:11px;flex:0 0 auto}
  .main{height:100%;min-height:0;display:grid;grid-template-rows:56px minmax(0,1fr) auto;background:var(--surface);min-width:0;overflow:hidden}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 24px;border-bottom:1px solid rgba(225,219,209,.52)}
  .crumb{display:flex;align-items:center;gap:9px;min-width:0}
  .orb{width:19px;height:19px;border:1.5px solid #0f766e;border-radius:50%;position:relative;flex:0 0 auto}
  .orb:after{content:"";position:absolute;right:-3px;top:-3px;width:7px;height:7px;border-radius:50%;background:#7dd3fc;border:1px solid var(--surface)}
  .crumb-text{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top-actions{display:flex;align-items:center;gap:8px}
  .top-action{height:32px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 11px;color:#514b44;font-size:13px}
  .top-action:hover{border-color:var(--line-strong);background:#fbfaf7}
  .workspace-scroll{overflow-y:auto;overflow-x:hidden;min-width:0;min-height:0;overscroll-behavior:contain}
  .workspace{width:100%;min-height:100%;padding:22px 24px 26px}
  .workspace.chat-mode{height:100%;min-height:0;padding:0 24px 18px;overflow:hidden}
  .empty-workspace{min-height:100%;display:grid;place-items:center}
  .empty-shell{width:min(820px,100%);display:grid;gap:18px}
  .empty-copy h1{font-size:28px;line-height:1.18;margin:0 0 8px;font-weight:720}
  .empty-copy p{max-width:560px;margin:0;color:var(--muted);font-size:15px}
  .upload-card{border:1px dashed var(--line-strong);background:#fbfaf7;border-radius:10px;padding:22px;display:grid;gap:14px}
  .upload-card.drag{border-color:var(--blue);background:#eef8fd}
  .upload-title{font-weight:680;font-size:16px}
  .upload-meta{color:var(--muted);font-size:13px}
  .upload-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .button{height:34px;border:1px solid var(--line-strong);background:#fff;border-radius:8px;padding:0 11px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:13px;color:var(--text)}
  .button.primary{background:#24211c;color:#fff;border-color:#24211c}
  .button:hover{border-color:#bdb2a3}
  .progress{height:7px;border-radius:999px;background:#e8e1d7;overflow:hidden}
  .progress-bar{height:100%;width:0;background:var(--blue);transition:width .15s}
  .empty-utilities{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(260px,.8fr);gap:14px}
  .utility-panel,.panel{border:1px solid var(--line);background:var(--surface-2);border-radius:10px;padding:14px;min-width:0}
  .tips-page{max-width:920px;margin:0 auto;padding:10px 0 28px}
  .tips-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
  .tips-title{font-size:26px;line-height:1.15;font-weight:730;margin-bottom:6px}
  .tips-copy{color:var(--muted);max-width:600px}
  .tips-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .tips-card{border:1px solid var(--line);background:#fff;border-radius:9px;padding:14px;min-width:0}
  .tips-card h2{font-size:15px;margin:0 0 8px}
  .tips-card ul{margin:0;padding-left:18px;color:#443e37}
  .tips-card li{margin:5px 0}
  .tips-example{margin-top:10px;color:var(--muted);font-size:12px;border-top:1px solid var(--line);padding-top:9px}
  .field-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px}
  .project-picker{display:grid;grid-template-columns:minmax(0,1fr);gap:8px}
  .project-picker .upload-row{justify-content:flex-start}
  input,select{height:34px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 9px;color:#312d28;min-width:0}
  .workspace-grid{height:100%;min-height:0;display:grid;grid-template-columns:minmax(420px,1.15fr) minmax(360px,.85fr);gap:18px}
  .chat-workspace{height:100%;min-height:0;max-width:980px;margin:0 auto;display:grid;grid-template-rows:auto minmax(0,1fr);gap:0}
  .media-focus{padding:12px 0 10px;border-bottom:1px solid rgba(225,219,209,.72)}
  .media-stage{position:relative;background:#0c0b09;border:1px solid #15120f;border-radius:10px;overflow:hidden;box-shadow:0 16px 36px rgba(21,18,15,.14)}
  .media-stage video{width:100%;max-height:32vh;aspect-ratio:16/9;object-fit:contain;background:#0c0b09}
  .media-actions{position:absolute;right:10px;top:10px;display:flex;gap:8px;z-index:2}
  .media-actions .button{background:rgba(255,253,250,.94);backdrop-filter:blur(10px)}
  .media-actions .button.primary{background:rgba(36,33,28,.94);border-color:rgba(36,33,28,.94);color:#fff}
  .preview-pane,.agent-pane{min-width:0;display:grid;gap:14px;align-content:start}
  .panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
  .panel-title{font-weight:680;font-size:15px}
  .panel-subtitle{font-size:13px;color:var(--muted);margin-top:2px;overflow-wrap:anywhere}
  .panel-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .video-frame{background:#0c0b09;border-radius:10px;overflow:hidden;border:1px solid #15120f}
  video{width:100%;max-height:45vh;background:#0c0b09;display:block}
  .metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:12px}
  .metric{border:1px solid var(--line);background:#fff;border-radius:8px;padding:9px;min-width:0}
  .metric-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .metric-value{font-weight:650;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  details{margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
  summary{cursor:pointer;color:var(--muted);font-weight:560}
  .path-list{display:grid;gap:7px;margin-top:9px;color:#4b4640;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;overflow-wrap:anywhere}
  .tool-grid{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;margin-top:10px}
  .tool-grid.stack{grid-template-columns:minmax(0,1fr) auto auto}
  .chat-panel{min-height:340px;display:grid;grid-template-rows:auto minmax(0,1fr)}
  .chat-log{display:grid;gap:14px;min-height:0;max-height:42vh;overflow-y:auto;overflow-x:hidden;padding:2px 8px 4px 0;scrollbar-gutter:stable}
  .chat-mode .chat-log{max-height:none;height:100%;align-content:start;padding:18px 6px 24px 0}
  .message{display:grid;grid-template-columns:32px minmax(0,1fr);gap:10px}
  .message .avatar{width:28px;height:28px}
  .bubble{min-width:0}
  .role{font-size:12px;color:var(--muted);margin-bottom:2px}
  .message.user .avatar{background:#ddd7ce}
  .message.agent .avatar{background:#f2dfc7;color:#7c3a00}
  .bubble-text{white-space:pre-wrap;word-break:break-word}
  .empty-note{color:var(--muted);padding:10px 0}
  .tool-stack{margin:2px 0 4px 42px;border:1px solid var(--line);background:#fff;border-radius:9px;overflow:hidden}
  .tool-stack[open]{border-color:var(--line-strong)}
  .tool-stack summary{min-height:68px;list-style:none;cursor:pointer;padding:10px 12px;display:grid;grid-template-columns:18px minmax(0,1fr) auto;gap:10px;align-items:center}
  .tool-stack summary::-webkit-details-marker{display:none}
  .tool-stack-body{display:grid;gap:8px;border-top:1px solid var(--line);padding:8px;background:#fbfaf7}
  .tool-stack-main{min-width:0;display:grid;gap:3px;align-content:center}
  .tool-stack-title{font-weight:590;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tool-stack-subtitle{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .runner-dot{width:10px;height:10px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 0 rgba(18,104,143,.35)}
  .tool-stack.running .runner-dot{animation:pulse 1.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(18,104,143,.35)}70%{box-shadow:0 0 0 8px rgba(18,104,143,0)}100%{box-shadow:0 0 0 0 rgba(18,104,143,0)}}
  .trace-card{margin:0;padding:0;border:1px solid var(--line);background:#fff;border-radius:8px;overflow:hidden}
  .trace-card[open]{border-color:var(--line-strong)}
  .trace-card.error{border-color:#efc3ba;background:#fffafa}
  .trace-card summary{list-style:none;cursor:pointer;padding:9px;display:grid;grid-template-columns:24px minmax(0,1fr) auto;gap:9px;align-items:center}
  .trace-card summary::-webkit-details-marker{display:none}
  .trace-body{border-top:1px solid var(--line);padding:10px 12px 12px;color:#3f3932;font-size:12px;white-space:pre-wrap;overflow-wrap:anywhere;background:#fffdfa}
  .trace-card.error .trace-body{background:#fff5f2}
  .trace-main{min-width:0;display:grid}
  .progress-list{display:grid;gap:8px}
  .trace-item{display:grid;grid-template-columns:28px minmax(0,1fr) auto;align-items:center;gap:9px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:9px}
  .status-dot{width:20px;height:20px;border-radius:50%;border:1px solid var(--line-strong);display:grid;place-items:center;color:var(--blue);font-size:11px}
  .status-dot.ok{color:var(--green);border-color:#b7dbc2;background:#f1fbf4}
  .status-dot.err{color:var(--red);border-color:#efc3ba;background:#fff3ef}
  .trace-title{font-weight:590;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .trace-detail{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{font-size:12px;border:1px solid var(--line);background:#fbfaf7;border-radius:999px;padding:2px 7px;color:var(--muted);white-space:nowrap}
  .composer-wrap{position:relative;z-index:5;padding:10px 24px 16px;background:linear-gradient(180deg,rgba(255,253,250,0),var(--surface) 18%)}
  .composer{max-width:1120px;width:100%;margin:0 auto;border:1px solid var(--line);border-radius:10px;background:#fff;box-shadow:var(--shadow);overflow:hidden}
  .input-row{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:end;gap:8px;padding:10px}
  textarea{width:100%;height:46px;border:0;outline:0;resize:none;overflow-y:auto;background:transparent;color:var(--text);padding:2px 4px}
  textarea::placeholder{color:#b6aea5}
  .send{height:34px;min-width:46px;border-radius:8px;background:#24211c;color:#fff;padding:0 12px}
  .send:disabled{background:#8d857b}
  .composer-status{display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);padding:7px 12px;color:var(--muted);font-size:12px}
  .model{margin-left:auto;color:#4b4640}
  .toast{position:fixed;right:16px;bottom:16px;background:#2c2925;color:#fff;border-radius:9px;padding:10px 12px;box-shadow:var(--shadow);display:none;max-width:min(520px,calc(100vw - 32px));z-index:20}
  .toast.open{display:block}
  @media (max-width:1100px){
    .workspace-grid{grid-template-columns:1fr}
    .chat-log{max-height:340px}
    .chat-mode .chat-log{max-height:none}
    .media-stage video{max-height:30vh}
    video{max-height:360px}
  }
  @media (max-width:820px){
    .app{grid-template-columns:1fr}
    .rail{display:none}
    .topbar{padding:0 14px}
    .top-actions{gap:5px}
    .top-action{padding:0 8px}
    .workspace{padding:14px}
    .workspace.chat-mode{padding:0 14px 12px}
    .empty-utilities{grid-template-columns:1fr}
    .tips-grid{grid-template-columns:1fr}
    .metric-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .field-row,.tool-grid,.tool-grid.stack{grid-template-columns:1fr}
    .media-focus{padding:8px 0 10px}
    .media-actions{position:static;padding:8px;background:#111}
    .media-actions .button{flex:1}
    .panel-actions{justify-content:flex-start}
    .composer-wrap{padding:8px 10px 12px}
    .input-row{grid-template-columns:auto minmax(0,1fr) auto}
    .button.attach{width:36px;padding:0}
    .button.attach span{display:none}
  }
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="rail">
    <div class="brand">
      <div class="brand-title">Vex Code</div>
      <span class="preview">Local preview</span>
    </div>
    <button class="primary-action" id="newSession"><span>+</span><span>New session</span></button>
    <div class="rail-actions">
      <button class="nav-btn" id="projectsButton"><span class="nav-icon">P</span><span>Projects</span></button>
      <button class="nav-btn" id="exportsButton"><span class="nav-icon">E</span><span>Exports</span></button>
      <button class="nav-btn" id="queueButton"><span class="nav-icon">Q</span><span>Queue</span></button>
      <button class="nav-btn" id="settingsButton"><span class="nav-icon">S</span><span>Settings</span></button>
      <button class="nav-btn" id="tipsButton"><span class="nav-icon">T</span><span>Tips & Tricks</span></button>
    </div>
    <div class="recents-head">
      <span>Recent projects</span>
      <span id="recentCount">0</span>
    </div>
    <div class="sessions" id="sessions"></div>
    <div class="rail-bottom">
      <div class="status-card"><span></span><span>Local video workspace</span><b>Ready</b></div>
      <div class="identity"><span class="avatar">AL</span><span>Lamps Max</span></div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="crumb">
        <span class="orb"></span>
        <span class="crumb-text"><span id="providerName">Vex</span> / <span id="projectName">No project</span></span>
      </div>
      <div class="top-actions">
        <button class="top-action" id="progressButton">Progress</button>
        <button class="top-action" id="topDownloadButton">Download</button>
        <button class="top-action" id="focusButton">Focus</button>
      </div>
    </header>

    <section class="workspace-scroll" id="scroll">
      <div class="workspace" id="workspace"></div>
    </section>

    <footer class="composer-wrap">
      <div class="composer">
        <div class="input-row">
          <input id="fileInput" type="file" accept=".mp4,.mov,.avi,.mkv,.webm,.m4v,.flv" hidden>
          <button class="button attach" id="attachButton" title="Attach video">Attach<span> video</span></button>
          <textarea id="messageInput" placeholder="Ask Vex for an edit, export, transcript, short, or visual pass"></textarea>
          <button class="send" id="sendMessage">Run</button>
        </div>
        <div class="composer-status">
          <span id="jobStatus">Idle</span>
          <span id="uploadStatus">No upload active</span>
          <span class="model" id="modelName">Model</span>
        </div>
      </div>
    </footer>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
const appState = { current:null, pending:null, liveTrace:[], running:false, eventSource:null };
const exportPresets = [
  ["youtube_1080p", "YouTube 1080p"],
  ["instagram_reels", "Instagram Reels"],
  ["tiktok", "TikTok"],
  ["twitter_x", "X landscape"],
  ["podcast_audio", "Podcast audio"]
];

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" }[ch]));
}

function toast(message){
  const el = $("toast");
  el.textContent = message;
  el.classList.add("open");
  clearTimeout(toast.timer);
  toast.timer = setTimeout(() => el.classList.remove("open"), 4200);
}

async function api(path, options = {}){
  const response = await fetch(path, { headers:{ "content-type":"application/json" }, ...options });
  const data = await response.json();
  if (!response.ok || data.ok === false) throw new Error(data.error || `Request failed: ${response.status}`);
  return data;
}

function formatDuration(value){
  const sec = Number(value || 0);
  if (!sec) return "0s";
  const min = Math.floor(sec / 60);
  const rem = Math.round(sec % 60);
  return min ? `${min}m ${rem}s` : `${rem}s`;
}

function sourceLabel(project){
  return project?.artifacts?.source_url || project?.artifacts?.upload_filename || (project?.source_files || [])[0] || "Source";
}

function latestExport(project){
  return project?.artifacts?.latest_export || null;
}

function setBusy(busy, label){
  appState.running = busy;
  ["sendMessage","attachButton","newSession"].forEach((id) => {
    const el = $(id);
    if (el) el.disabled = busy;
  });
  $("topDownloadButton").disabled = busy || !appState.current?.project;
  document.querySelectorAll("[data-busy-disable]").forEach((el) => {
    el.disabled = busy;
  });
  $("sendMessage").textContent = busy ? "..." : "Run";
  $("jobStatus").textContent = label || (busy ? "Working" : "Idle");
}

function renderProjects(payload){
  const projects = payload.projects || [];
  $("recentCount").textContent = String(projects.length);
  $("sessions").innerHTML = projects.length
    ? projects.map((item) => `
        <button class="session ${payload.project?.id === item.id ? "active" : ""}" data-project-id="${escapeHtml(item.id)}">
          <span class="dot"></span>
          <span class="name">${escapeHtml(item.name || item.short_id)}</span>
        </button>
      `).join("")
    : `<div class="empty-note">No saved projects.</div>`;
  const select = $("projectSelect");
  if (select) {
    select.innerHTML = projects.length
      ? projects.map((item) => `<option value="${escapeHtml(item.id)}">${escapeHtml(item.name || item.short_id)}</option>`).join("")
      : `<option value="">No saved projects</option>`;
    if (payload.project?.id) select.value = payload.project.id;
  }
}

function uploadMarkup(compact = false){
  return `
    <div class="upload-card" data-drop-zone>
      <div>
        <div class="upload-title">${compact ? "Replace or add source media" : "Drop a video here or choose a file"}</div>
        <div class="upload-meta">Supports mp4, mov, avi, mkv, webm, m4v, flv.</div>
      </div>
      <div class="progress" aria-hidden="true"><div class="progress-bar" id="uploadBar"></div></div>
      <div class="upload-row">
        <button class="button primary" id="chooseFile" data-busy-disable>Choose file</button>
        <span class="upload-meta">Uploads create a local Vex project.</span>
      </div>
    </div>

function renderLoadedWorkspace(project, payload){
  const current = `${project.links.media_current}?v=${encodeURIComponent(project.updated_at || Date.now())}`;
  $("workspace").className = "workspace chat-mode";
  $("workspace").innerHTML = `
    <div class="chat-workspace">
      <section class="media-focus">
        <div class="media-stage">
          <div class="media-actions" id="exportPanel">
            <button class="button primary" id="exportBtn" data-busy-disable>Export</button>
          </div>
          <video controls src="${escapeHtml(current)}"></video>
        </div>
      </section>
      <div class="chat-log" id="chatLog"></div>
    </div>
  `;
}

function conversationFromState(){
  const project = appState.current?.project;
  const conversation = (project?.conversation || []).map((item) => ({
    role:item.role === "user" ? "you" : "agent",
    text:item.content
  }));
  if (appState.pending) {
    conversation.push({ role:"you", text:appState.pending.user });
    conversation.push({ role:"agent", text:appState.pending.agent || "Running commands..." });
  }
  return conversation;
}

function activeTraceEvents(){
  const project = appState.current?.project;
  return appState.liveTrace.length ? appState.liveTrace : (project?.artifacts?.latest_agent_trace?.events || []);
}

function traceDetail(event){
  return event?.metadata?.full_detail || event?.detail || event?.kind || "";
}

function commandEvents(events){
  return events.filter((event) => event.kind === "tool" || /^Running /.test(event.title || "") || /\b(completed|failed)$/.test(event.title || ""));
}

function commandSummary(events){
  const commands = commandEvents(events);
  const started = commands.filter((event) => /^Running /.test(event.title || ""));
  const errors = commands.filter((event) => event.status === "error");
  const latest = commands[commands.length - 1] || events[events.length - 1];
  const count = started.length || commands.length;
  const noun = count === 1 ? "command" : "commands";
  let title = count ? `Ran ${count} ${noun}` : "No commands";
  if (appState.running) title = count ? `Running ${count} ${noun}` : "Starting commands";
  if (!appState.running && errors.length) title = `Ran ${count} ${noun}, ${errors.length} error${errors.length === 1 ? "" : "s"}`;
  return {
    title,
    subtitle: latest ? `${latest.title || latest.kind || "Agent step"}${traceDetail(latest) ? `: ${traceDetail(latest)}` : ""}` : "Tool calls are hidden by default.",
    status: errors.length ? "error" : appState.running ? "running" : "success",
    commands: commands.length ? commands : events,
  };
}

function traceMarkup(events){
  if (!events.length) return "";
  const summary = commandSummary(events);
  return `
    <details class="tool-stack ${appState.running ? "running" : ""}" id="progressPanel">
      <summary title="${escapeHtml(summary.subtitle)}">
        <span class="runner-dot"></span>
        <span class="tool-stack-main">
          <span class="tool-stack-title">${escapeHtml(summary.title)}</span>
          <span class="tool-stack-subtitle">${escapeHtml(summary.subtitle)}</span>
        </span>
        <span class="badge">${escapeHtml(summary.status)}</span>
      </summary>
      <div class="tool-stack-body">
      ${summary.commands.map((event) => {
        const status = event.status || "info";
        const full = traceDetail(event);
        const title = event.title || event.kind || "Agent step";
        const isError = status === "error";
        return `
          <details class="trace-card ${isError ? "error" : ""}">
            <summary title="${escapeHtml(full)}">
              <span class="status-dot ${status === "success" ? "ok" : isError ? "err" : ""}">${escapeHtml(event.step || "")}</span>
              <span class="trace-main">
                <span class="trace-title">${escapeHtml(title)}</span>
                <span class="trace-detail">${escapeHtml(full)}</span>
              </span>
              <span class="badge">${escapeHtml(status)}</span>
            </summary>
            <div class="trace-body">${escapeHtml(full || "No details.")}</div>
          </details>
        `;
      }).join("")}
      </div>
    </details>
  `;
}

function renderChat(){
  const chat = $("chatLog");
  if (!chat) return;
  const shouldStickToBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 64;
  const conversation = conversationFromState();
  const events = activeTraceEvents();
  chat.innerHTML = conversation.length
    ? conversation.map((msg) => `
        <div class="message ${msg.role === "you" ? "user" : "agent"}">
          <span class="avatar">${msg.role === "you" ? "AL" : "VX"}</span>
          <div class="bubble">
            <div class="role">${escapeHtml(msg.role === "you" ? "You" : "Vex")}</div>
            <div class="bubble-text">${escapeHtml(msg.text)}</div>
          </div>
        </div>
      `).join("") + traceMarkup(events)
    : traceMarkup(events) || `<div class="empty-note">No messages yet. Ask Vex what to change in the composer below.</div>`;
  if (shouldStickToBottom || appState.pending) {
    chat.scrollTop = chat.scrollHeight;
  }
}

function renderTrace(project, liveEvents){
  const trace = $("traceBlock");
  if (!trace) {
    renderChat();
    return;
  }
  const events = liveEvents || (appState.liveTrace.length ? appState.liveTrace : (project?.artifacts?.latest_agent_trace?.events || []));
  trace.innerHTML = events.length
    ? `<div class="progress-list">
        ${events.map((event) => `
          <div class="trace-item">
            <span class="status-dot ${event.status === "success" ? "ok" : event.status === "error" ? "err" : ""}">${escapeHtml(event.step || "")}</span>
            <div>
              <div class="trace-title">${escapeHtml(event.title || event.kind || "Agent step")}</div>
              <div class="trace-detail">${escapeHtml(event.detail || event.kind || "")}</div>
            </div>
            <span class="badge">${escapeHtml(event.status || "info")}</span>
          </div>
        `).join("")}
      </div>`
    : `<div class="empty-note">No progress yet. Tool calls and live trace events will appear here.</div>`;
}

function render(payload, liveEvents){
  appState.current = payload;
  const project = payload.project;
  $("providerName").textContent = payload.provider || "Vex";
  $("modelName").textContent = payload.model || "Model";
  $("projectName").textContent = project ? project.name : "No project";
  $("topDownloadButton").disabled = !project || appState.running;
  if (project) {
    renderLoadedWorkspace(project, payload);
  } else {
    renderEmptyWorkspace(payload);
  }
  renderProjects(payload);
  renderChat();
  renderTrace(project, liveEvents);
  bindDropZones();
}

async function refresh(){
  render(await api("/api/state"));
}

async function newSession(){
  if (appState.eventSource) return toast("Wait for the current job to finish.");
  const payload = await api("/api/new-session", { method:"POST", body:JSON.stringify({}) });
  appState.pending = null;
  appState.liveTrace = [];
  $("messageInput").value = "";
  $("uploadStatus").textContent = "No upload active";
  render(payload);
  toast("New session ready.");
}

async function selectProject(projectId){
  const select = $("projectSelect");
  const id = projectId || select?.value || "";
  if (!id) return toast("No project selected.");
  const payload = await api("/api/select", { method:"POST", body:JSON.stringify({ project_id:id }) });
  appState.liveTrace = [];
  appState.pending = null;
  render(payload);
}

async function loadSource(){
  const input = $("sourceInput");
  const source = input?.value.trim() || "";
  if (!source) return toast("Enter a video path or YouTube URL.");
  setBusy(true, "Loading source");
  try {
    const payload = await api("/api/load", { method:"POST", body:JSON.stringify({ source }) });
    appState.liveTrace = [];
    appState.pending = null;
    render(payload);
    toast(payload.message || "Source loaded.");
  } catch (err) {
    toast(err.message);
  } finally {
    setBusy(false);
  }
}

function uploadFile(file){
  if (!file) return;
  const xhr = new XMLHttpRequest();
  $("uploadStatus").textContent = `Uploading ${file.name}`;
  const bar = $("uploadBar");
  if (bar) bar.style.width = "0%";
  setBusy(true, "Uploading");
  xhr.upload.onprogress = (event) => {
    if (event.lengthComputable) {
      const activeBar = $("uploadBar");
      if (activeBar) activeBar.style.width = `${Math.round((event.loaded / event.total) * 100)}%`;
    }
  };
  xhr.onload = () => {
    setBusy(false);
    try {
      const payload = JSON.parse(xhr.responseText || "{}");
      if (xhr.status < 200 || xhr.status >= 300 || payload.ok === false) throw new Error(payload.error || `Upload failed: ${xhr.status}`);
      $("uploadStatus").textContent = "Upload complete";
      const activeBar = $("uploadBar");
      if (activeBar) activeBar.style.width = "100%";
      appState.liveTrace = [];
      appState.pending = null;
      render(payload);
    } catch (err) {
      $("uploadStatus").textContent = "Upload failed";
      toast(err.message);
    }
  };
  xhr.onerror = () => {
    setBusy(false);
    $("uploadStatus").textContent = "Upload failed";
    toast("Upload failed.");
  };
  xhr.open("POST", "/api/upload");
  xhr.setRequestHeader("content-type", "application/octet-stream");
  xhr.setRequestHeader("x-vex-filename", encodeURIComponent(file.name));
  xhr.send(file);
}

async function startJob(message){
  if (!message) return toast("Enter an instruction.");
  if (!appState.current?.project) return toast("Load a video first.");
  setBusy(true, "Starting job");
  appState.liveTrace = [];
  appState.pending = { user:message, agent:"" };
  renderChat();
  renderTrace(appState.current?.project, appState.liveTrace);
  try {
    const job = await api("/api/jobs", { method:"POST", body:JSON.stringify({ message }) });
    $("jobStatus").textContent = "Agent running";
    const events = new EventSource(`/api/jobs/${encodeURIComponent(job.job_id)}/events`);
    appState.eventSource = events;
    events.addEventListener("assistant_delta", (event) => {
      const data = JSON.parse(event.data);
      appState.pending.agent += data.text || "";
      renderChat();
    });
    events.addEventListener("trace", (event) => {
      appState.liveTrace.push(JSON.parse(event.data));
      renderTrace(appState.current?.project, appState.liveTrace);
    });
    events.addEventListener("tool_start", (event) => {
      const data = JSON.parse(event.data);
      $("jobStatus").textContent = `Running ${data.tool_name}`;
      const badge = $("runStateBadge");
      if (badge) badge.textContent = "running";
    });
    events.addEventListener("tool_finish", (event) => {
      const data = JSON.parse(event.data);
      $("jobStatus").textContent = data.ok ? `Finished ${data.tool_name}` : `Failed ${data.tool_name}`;
    });
    events.addEventListener("state", (event) => {
      render(JSON.parse(event.data), appState.liveTrace);
    });
    events.addEventListener("result", (event) => {
      const data = JSON.parse(event.data);
      if (data.state) appState.current = data.state;
      appState.pending = null;
      render(data.state || appState.current, appState.liveTrace);
      toast(data.response?.success ? "Agent run complete." : "Agent run finished with errors.");
    });
    events.addEventListener("error", (event) => {
      const data = JSON.parse(event.data);
      if (data.state) appState.current = data.state;
      appState.pending = { user:message, agent:`Error: ${data.message}` };
      render(appState.current, appState.liveTrace);
      toast(data.message || "Agent job failed.");
    });
    events.addEventListener("done", () => {
      events.close();
      appState.eventSource = null;
      setBusy(false);
      render(appState.current, appState.liveTrace);
    });
    events.onerror = () => {
      events.close();
      appState.eventSource = null;
      setBusy(false);
    };
  } catch (err) {
    appState.pending = null;
    setBusy(false);
    renderChat();
    toast(err.message);
  }
}

function sendMessage(){
  const message = $("messageInput").value.trim();
  $("messageInput").value = "";
  startJob(message);
}

function exportCurrent(){
  const preset = $("exportPreset")?.value || "youtube_1080p";
  startJob(`export the current video using the ${preset} preset`);
}

function scrollToPanel(id, fallback){
  const target = $(id);
  if (!target) return toast(fallback);
  target.scrollIntoView({ behavior:"smooth", block:"start" });
}

function toggleFocusMode(){
  const focused = !$("app").classList.contains("focus");
  $("app").classList.toggle("focus", focused);
  $("focusButton").textContent = focused ? "Sidebar" : "Focus";
}

function downloadCurrent(){
  const link = appState.current?.project?.links?.download_current;
  if (!link) return toast("Load a video before downloading.");
  window.location.href = link;
}

function bindDropZones(){
  document.querySelectorAll("[data-drop-zone]").forEach((zone) => {
    if (zone.dataset.bound === "true") return;
    zone.dataset.bound = "true";
    zone.addEventListener("dragover", (event) => {
      event.preventDefault();
      zone.classList.add("drag");
    });
    zone.addEventListener("dragleave", () => zone.classList.remove("drag"));
    zone.addEventListener("drop", (event) => {
      event.preventDefault();
      zone.classList.remove("drag");
      uploadFile(event.dataTransfer.files[0]);
    });
  });
}

document.addEventListener("click", (event) => {
  const target = event.target.closest("button");
  if (!target) return;
  const id = target.id;
  if (id === "attachButton" || id === "chooseFile") $("fileInput").click();
  if (id === "refreshProjects") refresh().catch((err) => toast(err.message));
  if (id === "openProject") selectProject().catch((err) => toast(err.message));
  if (id === "loadSource") loadSource();
  if (id === "sendMessage") sendMessage();
  if (id === "exportBtn") exportCurrent();
  if (id === "downloadCurrentBtn" || id === "topDownloadButton") downloadCurrent();
  if (id === "newSession") newSession().catch((err) => toast(err.message));
  if (id === "focusButton") toggleFocusMode();
  if (id === "projectsButton") scrollToPanel("projectPanel", "Load a video to see project controls.");
  if (id === "exportsButton") scrollToPanel("exportPanel", "Load a video to see export controls.");
  if (id === "queueButton" || id === "progressButton") scrollToPanel("progressPanel", "No progress panel is available yet.");
  if (id === "settingsButton") toast(`${appState.current?.provider || "Provider"} / ${appState.current?.model || "Model"}`);
  if (id === "tipsButton") renderTipsPage();
  if (id === "tipsBack") render(appState.current || { project:null, projects:[], provider:"Vex", model:"Model" });
});

document.addEventListener("click", (event) => {
  const session = event.target.closest("[data-project-id]");
  if (!session) return;
  selectProject(session.dataset.projectId).catch((err) => toast(err.message));
});

$("fileInput").addEventListener("change", (event) => uploadFile(event.target.files[0]));
$("messageInput").addEventListener("keydown", (event) => {
  if ((event.ctrlKey || event.metaKey) && event.key === "Enter") sendMessage();
});

refresh().catch((err) => toast(err.message));
</script>
